apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: plots-ingress
  namespace: plots-system
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: yourapp.com
      http:
        paths:
          # API Gateway handles all /api/* traffic
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
          # Frontend (Next.js) handles everything else
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
  # tls:
  #   - hosts:
  #       - yourapp.com
  #     secretName: plots-tls
