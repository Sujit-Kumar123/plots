apiVersion: v1
kind: ConfigMap
metadata:
  name: plots-config
  namespace: plots-system
data:
  APP_ENV: "production"
  DEBUG: "false"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  CHAT_COMMAND_URL: "http://chat-command:8001"
  CHAT_QUERY_URL: "http://chat-query:8002"
  PLOT_COMMAND_URL: "http://plot-command:8003"
  PLOT_QUERY_URL: "http://plot-query:8004"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "mvp_db"
  REDIS_URL: "redis://redis:6379/0"
