apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: plots-system
  labels:
    app: payment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: plots/payment-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8011
          envFrom:
            - configMapRef:
                name: plots-config
          env:
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: plots-secrets
                  key: INTERNAL_SERVICE_SECRET
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: plots-secrets
                  key: STRIPE_SECRET_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: plots-secrets
                  key: STRIPE_WEBHOOK_SECRET
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8011
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8011
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: plots-system
spec:
  selector:
    app: payment-service
  ports:
    - port: 8011
      targetPort: 8011
  type: ClusterIP
