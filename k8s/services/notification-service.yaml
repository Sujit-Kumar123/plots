apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: plots-system
  labels:
    app: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: plots/notification-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8012
          envFrom:
            - configMapRef:
                name: plots-config
          env:
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: plots-secrets
                  key: INTERNAL_SERVICE_SECRET
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: plots-secrets
                  key: SENDGRID_API_KEY
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8012
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8012
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: plots-system
spec:
  selector:
    app: notification-service
  ports:
    - port: 8012
      targetPort: 8012
  type: ClusterIP
