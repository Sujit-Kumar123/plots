apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: plots-system
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      initContainers:
        # Run alembic migrations before the service starts
        - name: db-migrate
          image: plots/auth-service:latest
          imagePullPolicy: Always
          command: ["uv", "run", "alembic", "upgrade", "head"]
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: plots-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: plots-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/mvp_db"
      containers:
        - name: auth-service
          image: plots/auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8010
          envFrom:
            - configMapRef:
                name: plots-config
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: plots-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: plots-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/mvp_db"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: plots-secrets
                  key: REDIS_PASSWORD
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis:6379/0"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: plots-secrets
                  key: SECRET_KEY
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: plots-secrets
                  key: INTERNAL_SERVICE_SECRET
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: plots-secrets
                  key: SENDGRID_API_KEY
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: plots-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: plots-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: GOOGLE_REDIRECT_URI
              valueFrom:
                secretKeyRef:
                  name: plots-secrets
                  key: GOOGLE_REDIRECT_URI
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: plots-secrets
                  key: AZURE_CLIENT_ID
            - name: AZURE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: plots-secrets
                  key: AZURE_CLIENT_SECRET
            - name: AZURE_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: plots-secrets
                  key: AZURE_TENANT_ID
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: plots-system
spec:
  selector:
    app: auth-service
  ports:
    - port: 8010
      targetPort: 8010
  type: ClusterIP
