apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-command
  namespace: plots-system
  labels:
    app: chat-command
spec:
  replicas: 3
  selector:
    matchLabels:
      app: chat-command
  template:
    metadata:
      labels:
        app: chat-command
    spec:
      containers:
        - name: chat-command
          image: plots/chat-command:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: plots-config
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: plots-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: plots-secrets
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: chat-command
  namespace: plots-system
spec:
  selector:
    app: chat-command
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
