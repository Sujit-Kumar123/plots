apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: plot-service-hpa
  namespace: plots-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: plot-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
