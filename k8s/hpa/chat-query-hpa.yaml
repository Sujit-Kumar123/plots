apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chat-query-hpa
  namespace: plots-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chat-query
  minReplicas: 3
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 5
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
