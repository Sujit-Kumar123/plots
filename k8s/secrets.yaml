# IMPORTANT: Replace all <base64-encoded-*> values before applying.
# Generate: echo -n 'your-value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: plots-secrets
  namespace: plots-system
type: Opaque
data:
  SECRET_KEY: <base64-encoded-jwt-secret>
  INTERNAL_SERVICE_SECRET: <base64-encoded-internal-service-secret>
  POSTGRES_USER: <base64-encoded-db-user>
  POSTGRES_PASSWORD: <base64-encoded-db-password>
  REDIS_PASSWORD: <base64-encoded-redis-password>
  SENDGRID_API_KEY: <base64-encoded-sendgrid-key>
  # Google OAuth2 (leave empty if not enabled)
  GOOGLE_CLIENT_ID: <base64-encoded-google-client-id>
  GOOGLE_CLIENT_SECRET: <base64-encoded-google-client-secret>
  GOOGLE_REDIRECT_URI: <base64-encoded-google-redirect-uri>
  # Azure AD OAuth2 (leave empty if not enabled)
  AZURE_CLIENT_ID: <base64-encoded-azure-client-id>
  AZURE_CLIENT_SECRET: <base64-encoded-azure-client-secret>
  AZURE_TENANT_ID: <base64-encoded-azure-tenant-id>
  # Stripe
  STRIPE_SECRET_KEY: <base64-encoded-stripe-secret-key>
  STRIPE_WEBHOOK_SECRET: <base64-encoded-stripe-webhook-secret>
