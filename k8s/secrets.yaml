# IMPORTANT: Replace all <base64-encoded-*> values before applying.
# Generate: echo -n 'your-value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: plots-secrets
  namespace: plots-system
type: Opaque
data:
  SECRET_KEY: <base64-encoded-jwt-secret>
  POSTGRES_USER: <base64-encoded-db-user>
  POSTGRES_PASSWORD: <base64-encoded-db-password>
  REDIS_PASSWORD: <base64-encoded-redis-password>
  SENDGRID_API_KEY: <base64-encoded-sendgrid-key>
  GOOGLE_CLIENT_ID: <base64-encoded-google-client-id>
  GOOGLE_CLIENT_SECRET: <base64-encoded-google-client-secret>
