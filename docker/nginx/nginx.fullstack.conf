# Auth endpoints get a strict rate limit; all other API traffic gets a relaxed one.
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m  rate=50r/s;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Next.js dev server — runs inside this container on loopback
upstream web {
    server 127.0.0.1:3000;
}

# Docker's embedded DNS resolver.
# Variable-based proxy_pass re-resolves the hostname on each request so a
# restarted api-gateway container is picked up without reloading nginx.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"     always;
    add_header X-Content-Type-Options "nosniff"        always;
    add_header X-XSS-Protection       "1; mode=block"  always;
    add_header Referrer-Policy        "same-origin"    always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml+rss image/svg+xml;
    gzip_min_length 1024;

    # ── API: auth routes (strict rate limit) ─────────────────────────────────
    # More specific prefix wins over the /api/ block below.
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        set $gateway http://api-gateway:8000;
        proxy_pass         $gateway;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── API: all other routes → api-gateway ──────────────────────────────────
    # Covers /api/v1/chat/, /api/v1/plots/, /api/profile/, /api/admin/,
    # /api/payments/, /api/notifications/, /api/uploads/, etc.
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        set $gateway http://api-gateway:8000;
        proxy_pass         $gateway;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Next.js: HMR WebSocket (dev hot-reload) ───────────────────────────────
    location /_next/webpack-hmr {
        proxy_pass         http://web;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
    }

    # ── Next.js: static assets (long-lived cache in prod) ────────────────────
    location /_next/static/ {
        proxy_pass http://web;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Next.js: everything else ──────────────────────────────────────────────
    location / {
        proxy_pass         http://web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Forwarded-Host  $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }
}
